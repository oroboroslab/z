    <line x1="28" y1="12" x2="36" y2="12" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="20" x2="40" y2="20" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="28" y1="28" x2="32" y2="28" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <!-- Data dots -->
